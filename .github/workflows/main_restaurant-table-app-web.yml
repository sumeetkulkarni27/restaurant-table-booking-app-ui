name: Build and Deploy Angular App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build Angular
      - name: Build Angular app (production)
        run: npm run build -- --configuration production

      # Upload build output (flattened)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/restaurant-table-app-ui/*

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: build

      # Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_72B3CAE7DFE04B25AF446808DD618A44 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D025C1DADCD4064AFCEDF9E7501EA23 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B54B4D038343436E993C031BA9BE55A6 }}

      # Deploy with CLEAN
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: restaurant-table-app-web
          slot-name: Production
          package: build
          clean: true

