name: Build and deploy Angular app to Azure Web App - restaurant-table-app-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # 3️⃣ Install dependencies (CI optimized)
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build Angular (production)
      - name: Build Angular app
        run: npm run build -- --configuration production

      # 5️⃣ Run tests properly in CI (no watch mode)
      - name: Run tests (CI mode)
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      # 6️⃣ Upload build artifact
      - name: Upload Angular build output
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: ./dist/restaurant-table-app-ui


  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # 1️⃣ Download artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-app
          path: ./build

      # 2️⃣ Debug (optional but helpful)
      - name: Show downloaded files
        run: ls -R ./build

      # 3️⃣ Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_72B3CAE7DFE04B25AF446808DD618A44 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D025C1DADCD4064AFCEDF9E7501EA23 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B54B4D038343436E993C031BA9BE55A6 }}

      # 4️⃣ Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'restaurant-table-app-web'
          slot-name: 'Production'
          package: ./build
