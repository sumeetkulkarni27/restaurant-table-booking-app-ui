<!-- Spinner Overlay -->
<div
  class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-50"
  style="z-index: 1055;" *ngIf="spinnerService.spinnerCounter$ | async">
  <div class="spinner-border text-light" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>
<a class="navbar-brand d-flex align-items-center" routerLink="/home">
  <span class="app-title fw-bold">Table Booking App</span>
</a>
<!-- ======= Header ======= -->
<header class="fixed-top shadow-sm bg-white">
  <nav class="navbar navbar-expand-lg navbar-light container">

    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center" routerLink="/home">
      <img src="../../assets/custom/Learn Smart Coding Logo white bg.png" height="45" class="me-2" alt="Logo">
    </a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/menu" routerLinkActive="active">Menu</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/events" routerLinkActive="active">Events</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/chefs" routerLinkActive="active">Chefs</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/gallery" routerLinkActive="active">Gallery</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active">Contact</a>
        </li>

        <!-- Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown">
            Action
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow">

            <li *ngIf="loginDisplay">
              <a class="dropdown-item" routerLink="/claims">Claims</a>
            </li>

            <li *ngIf="loginDisplay">
              <a class="dropdown-item" routerLink="/reservations">Reservations</a>
            </li>

            <li *ngIf="loginDisplay">
              <a class="dropdown-item" (click)="editProfile()">Edit Profile</a>
            </li>

            <li *ngIf="!loginDisplay">
              <a class="dropdown-item" (click)="login()">Login</a>
            </li>

            <li *ngIf="loginDisplay">
              <a class="dropdown-item text-danger" (click)="logout()">Logout</a>
            </li>

          </ul>
        </li>

        <!-- Book Button -->
        <li class="nav-item ms-lg-3">
          <a class="btn btn-primary px-4" routerLink="/book-a-table">
            Book a Table
          </a>
        </li>

      </ul>
    </div>

  </nav>
</header>

<!-- Main -->
<main class="mt-5 pt-5">
  <router-outlet *ngIf="!isIframe"></router-outlet>
</main>

<app-footer></app-footer>
